name: Deploy TokenRank to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tokenrank-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_TRUST_HOST: "true"
      AUTH_X_ID: ${{ secrets.AUTH_X_ID }}
      AUTH_X_SECRET: ${{ secrets.AUTH_X_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_APP_URL: https://tokenrank.org
      NEXTAUTH_URL: https://tokenrank.org
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build OpenNext worker
        run: pnpm run cf:build

      - name: Sync production runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node -e 'const keys = ["AUTH_SECRET", "AUTH_X_ID", "AUTH_X_SECRET", "DATABASE_URL"]; for (const key of keys) { if (!process.env[key]) throw new Error(`Missing ${key}`); } process.stdout.write(JSON.stringify(Object.fromEntries(keys.map((key) => [key, process.env[key]]))));' | pnpm exec wrangler secret bulk

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          packageManager: pnpm
          wranglerVersion: 4.110.0
